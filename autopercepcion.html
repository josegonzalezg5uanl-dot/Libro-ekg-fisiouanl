<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autopercepción — Libro ECG FISIOUANL</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/likert.css">
</head>
<body>

  <header>
    <h1 id="likert-titulo">Autopercepción General</h1>
  </header>

  <main>
    <p class="autopercepcion-descripcion" id="likert-descripcion">
      Evalúa tu nivel de confianza en cada tema del libro.
    </p>

    <div id="likert-container" class="likert-container"></div>

    <div id="likert-resultados" class="likert-resultados" style="display:none;">
      <h3>Tus resultados</h3>
      <p>Promedio: <span id="likert-promedio"></span> / 5</p>
      <p>Respondidas: <span id="likert-total"></span> de <span id="likert-total-preguntas"></span></p>
    </div>

    <div class="likert-actions">
      <button class="btn-guardar" onclick="LikertEngine.guardar()">💾 Guardar respuestas</button>
      <button class="btn-ver-resultados" onclick="LikertEngine.mostrarResultados()">📈 Ver resultados</button>
      <button class="btn-exportar" onclick="LikertEngine.exportarCSV()">📊 Exportar CSV</button>
      <button class="btn-resetear" onclick="LikertEngine.resetear()">🔄 Reiniciar</button>
    </div>
  </main>

  <footer>
    <p>Guía de Electrocardiografía — Libro Digital © 2025</p>
  </footer>

  <!-- Scripts: SIEMPRE en este orden -->
  <script src="js/session.js"></script>
  <script src="js/likert-config-full.js"></script>
  <script src="js/likert-engine.js"></script>

</body>
</html>
