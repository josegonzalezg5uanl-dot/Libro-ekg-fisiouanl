<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba showCharacterSheet</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: Arial, sans-serif; padding: 20px; }
        .character-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center;
        }
        .character-content {
            background: #111827; border: 1px solid #1e3a5f; border-radius: 16px;
            padding: 24px; max-width: 500px; width: 90%;
        }
        .character-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
        .character-avatar { font-size: 3rem; }
        .character-close { background: none; border: none; color: #8899aa; font-size: 1.5rem; cursor: pointer; margin-left: auto; }
        .character-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 20px; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 0.8rem; color: #607080; }
        .stat-value { font-size: 1.2rem; font-weight: bold; color: #60c8ff; }
        .badges-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; }
        .badge-item { 
            background: #1e2d40; border-radius: 8px; padding: 12px; text-align: center;
            border: 1px solid transparent; transition: all 0.3s ease;
        }
        .badge-item.earned { 
            background: #0d2e1a; border-color: #22c55e;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
        }
        .badge-icon { font-size: 1.5rem; margin-bottom: 4px; }
        .badge-name { font-size: 0.8rem; font-weight: bold; color: #e0e6f0; }
        .badge-desc { font-size: 0.7rem; color: #8899aa; line-height: 1.3; }
        .badges-title { font-size: 1rem; font-weight: bold; margin-bottom: 12px; color: #60c8ff; }
    </style>
</head>
<body>
    <h1>Prueba de showCharacterSheet()</h1>
    <p>Abre la consola (F12) y ejecuta: <strong>showCharacterSheet()</strong></p>
    <p>Si no hay errores, el modal debería abrirse correctamente.</p>
    
    <button onclick="testFunction()">Probar función</button>
    
    <script>
        // Estado simulado
        const state = {
            identity: { nombre: 'Juan Pérez' },
            points: 1250,
            lives: 2,
            energy: 75,
            streak: 4,
            earnedBadges: ['streak_master', 'energy_saver']
        };

        // Configuración de insignias
        const ALL_BADGES = [
            {
                id: 'perfect_score',
                name: 'Perfect Score',
                icon: '🏆',
                desc: 'Responde todas las preguntas correctamente'
            },
            {
                id: 'streak_master',
                name: 'Streak Master',
                icon: '🔥',
                desc: 'Alcanza una racha de 5 o más'
            },
            {
                id: 'energy_saver',
                name: 'Energy Saver',
                icon: '💚',
                desc: 'Termina con más del 80% de energía'
            }
        ];

        function getLevelText() {
            if (state.points >= 2000) return 'Experto ECG';
            if (state.points >= 1500) return 'Especialista';
            if (state.points >= 1000) return 'Intermedio';
            return 'Novato';
        }

        function showCharacterSheet() {
            console.log('Ejecutando showCharacterSheet()...');
            
            const modal = document.createElement('div');
            modal.className = 'character-modal';
            modal.innerHTML = `
                <div class="character-content">
                    <div class="character-header">
                        <div class="character-avatar">🧑‍⚕️</div>
                        <div class="character-info">
                            <div class="character-name">${state.identity?.nombre || 'Estudiante'}</div>
                            <div class="character-level">Nivel: ${getLevelText()}</div>
                        </div>
                        <button class="character-close" onclick="this.closest('.character-modal').remove()">✕</button>
                    </div>
                    
                    <div class="character-stats">
                        <div class="stat-item">
                            <div class="stat-label">Puntos</div>
                            <div class="stat-value">${state.points}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Vidas</div>
                            <div class="stat-value">${state.lives}/5</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Energía</div>
                            <div class="stat-value">${Math.round(state.energy)}%</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Racha</div>
                            <div class="stat-value">${state.streak}</div>
                        </div>
                    </div>
                    
                    <div class="character-badges">
                        <div class="badges-title">Insignias Ganadas</div>
                        <div class="badges-grid">
                            ${ALL_BADGES.map(b => `
                                <div class="badge-item ${state.earnedBadges.includes(b.id) ? 'earned' : ''}">
                                    <div class="badge-icon">${b.icon}</div>
                                    <div class="badge-name">${b.name}</div>
                                    <div class="badge-desc">${b.desc}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            console.log('✅ Modal creado exitosamente');
            
            // Cerrar al hacer clic fuera
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.remove();
                }
            });
        }

        function testFunction() {
            console.clear();
            console.log('=== INICIANDO PRUEBA DE showCharacterSheet() ===');
            try {
                showCharacterSheet();
                console.log('✅ PRUEBA COMPLETADA: La función se ejecutó sin errores');
            } catch (error) {
                console.error('❌ ERROR EN LA FUNCIÓN:', error);
            }
        }

        // Auto-prueba al cargar
        window.addEventListener('load', function() {
            console.log('Página cargada. Ejecuta showCharacterSheet() en la consola para probar.');
        });
    </script>
</body>
</html>
